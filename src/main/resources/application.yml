server:
  port: 8080

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  cloud:
    gateway:
      server:
        webflux:

          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

          routes:

            - id: auth-public
              uri: http://localhost:8081
              predicates:
                - Path=/api/auth/send-otp, /api/auth/verify-otp, /api/auth/refresh

            - id: auth-protected
              uri: http://localhost:8081
              predicates:
                - Path=/api/users/**
              filters:
                - JwtAuthFilter

            - id: idea-hub-saves
              uri: http://localhost:8082
              predicates:
                - Path=/api/ideas/saved, /api/ideas/mine, /api/ideas/*/save
              filters:
                - JwtAuthFilter

            - id: idea-hub-protected
              uri: http://localhost:8082
              predicates:
                - Path=/api/ideas, /api/ideas/**
                - Method=POST,PUT,DELETE,PATCH
              filters:
                - JwtAuthFilter

            - id: idea-hub-public
              uri: http://localhost:8082
              predicates:
                - Path=/api/ideas, /api/ideas/**, /api/categories, /api/tags
                - Method=GET

            - id: profiler
              uri: http://localhost:8083
              predicates:
                - Path=/api/profile/**, /api/partner/**
              filters:
                - JwtAuthFilter

            - id: dating
              uri: http://localhost:8084
              predicates:
                - Path=/api/dates/**
              filters:
                - JwtAuthFilter

            - id: dating-ws
              uri: http://localhost:8084
              predicates:
                - Path=/ws/**

            - id: swipes
              uri: http://localhost:8085
              predicates:
                - Path=/api/swipes/**
              filters:
                - JwtAuthFilter

          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:3000"
                  - "http://localhost:5173"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - PATCH
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true
                maxAge: 3600

jwt:
  secret: ${JWT_SECRET:your-very-long-secret-key-at-least-256-bits-long-for-security}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, gateway
  endpoint:
    health:
      show-details: always
    gateway:
      access: true

logging:
  level:
    com.project.gateway: DEBUG
    org.springframework.cloud.gateway: INFO