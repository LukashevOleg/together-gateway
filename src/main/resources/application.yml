server:
  port: 8080

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  cloud:
    gateway:
      server:
        webflux:

          # ── Глобальные фильтры (на все маршруты) ────────────────────────────
          default-filters:
#            - name: RequestRateLimiter
#              args:
#                redis-rate-limiter.replenishRate: 20
#                redis-rate-limiter.burstCapacity: 40
#                redis-rate-limiter.requestedTokens: 1
#                key-resolver: "#{@ipKeyResolver}"
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

          routes:

            # ── auth-service: публичные эндпоинты (OTP, refresh) ──────────────
            - id: auth-public
              uri: http://localhost:8081
              predicates:
                - Path=/api/auth/send-otp, /api/auth/verify-otp, /api/auth/refresh
#              filters:
#                # Отдельный жёсткий лимит — защита от SMS спама
#                - name: RequestRateLimiter
#                  args:
#                    redis-rate-limiter.replenishRate: 3
#                    redis-rate-limiter.burstCapacity: 5
#                    redis-rate-limiter.requestedTokens: 1
#                    key-resolver: "#{@ipKeyResolver}"
#                - name: CircuitBreaker
#                  args:
#                    name: authServiceCB
#                    fallbackUri: forward:/fallback/auth

            # ── auth-service: защищённые эндпоинты ───────────────────────────
            - id: auth-protected
              uri: http://localhost:8081
              predicates:
                - Path=/api/users/**
              filters:
                - JwtAuthFilter
#                - name: CircuitBreaker
#                  args:
#                    name: authServiceCB
#                    fallbackUri: forward:/fallback/auth

            # ── idea-hub: публичное чтение (без JWT) ──────────────────────────
            - id: idea-hub-public
              uri: http://localhost:8082
              predicates:
                - Path=/api/ideas, /api/ideas/**, /api/categories, /api/tags
                - Method=GET
#              filters:
#                - name: CircuitBreaker
#                  args:
#                    name: ideaHubCB
#                    fallbackUri: forward:/fallback/idea-hub

            # ── idea-hub: запись (требует JWT) ───────────────────────────────
            - id: idea-hub-protected
              uri: http://localhost:8082
              predicates:
                - Path=/api/ideas, /api/ideas/**
                - Method=POST,PUT,DELETE,PATCH
#              filters:
#                - JwtAuthFilter
#                - name: CircuitBreaker
#                  args:
#                    name: ideaHubCB
#                    fallbackUri: forward:/fallback/idea-hub

          # ── CORS ─────────────────────────────────────────────────────────────
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:3000"
                  - "http://localhost:5173"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - PATCH
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true
                maxAge: 3600

# ── JWT (тот же секрет что и в auth-service) ─────────────────────────────────
jwt:
  secret: ${JWT_SECRET:your-very-long-secret-key-at-least-256-bits-long-for-security}

