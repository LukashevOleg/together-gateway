# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.project.gateway: DEBUG
    org.springframework.cloud.gateway: INFO