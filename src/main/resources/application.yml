server:
    port: 8080

spring:
    application:
        name: api-gateway

    cloud:
        gateway:
            routes:
                # Auth Service ? ????????? ????????? (??? JWT ????????)
                - id: auth-service-public
                  uri: http://localhost:8081
                  predicates:
                      - Path=/api/auth/**
                  filters:
                      - name: JwtAuthFilter
                        args:
                            requireAuth: false

                # Auth Service ? ?????????? ????????? (? JWT)
                - id: auth-service-protected
                  uri: http://localhost:8081
                  predicates:
                      - Path=/api/users/**
                  filters:
                      - name: JwtAuthFilter
                        args:
                            requireAuth: true

            # ?????????? CORS ?? ?????? Gateway
            globalcors:
                cors-configurations:
                    '[/**]':
                        allowedOrigins:
                            - "http://localhost:3000"
                            - "http://localhost:5173"
                        allowedMethods:
                            - GET
                            - POST
                            - PUT
                            - DELETE
                            - OPTIONS
                        allowedHeaders: "*"
                        allowCredentials: true

jwt:
    secret: ${JWT_SECRET:your-very-long-secret-key-at-least-256-bits-long-for-security}